<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اشکان پیمان | AP Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== فونت B NAZANIN ===== */
    @font-face {
      font-family: 'BNazanin';
      src: url('https://cdn.fontcdn.ir/Fonts/BNAZANIN/B-NAZANIN.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'BNazanin';
      src: url('https://cdn.fontcdn.ir/Fonts/BNAZANIN/B-NAZANIN-BOLD.TTF') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'BNazanin', 'Vazirmatn', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f5e6c8 0%, #f5deb3 40%, #f5d6a8 100%);
      padding: 1rem;
      background-size: 400% 400%;
      animation: oceanMove 18s ease infinite;
      position: relative;
    }

    @keyframes oceanMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-card {
      max-width: 720px;
      width: 100%;
      padding: 2.5rem 1.8rem;
      background: rgba(255, 248, 235, 0.15);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 40px 15px 40px 15px;
      box-shadow: 
        0 20px 50px rgba(120, 80, 20, 0.15),
        inset 0 0 0 1px rgba(255, 215, 120, 0.2),
        inset 0 0 30px rgba(255, 215, 120, 0.08);
      border: 1px solid rgba(255, 215, 120, 0.1);
      text-align: center;
      color: #3d2b1a;
      position: relative;
      overflow: hidden;
      transition: 0.3s;
    }

    .glass-card > * {
      position: relative;
      z-index: 2;
    }

    /* ===== دکمه تغییر زبان ===== */
    .lang-switch {
      position: absolute;
      top: 15px;
      left: 18px;
      z-index: 10;
      background: linear-gradient(145deg, #ffd78a, #f5c96a);
      backdrop-filter: blur(8px);
      border: 2px solid #e8b84a;
      color: #3d2b1a;
      padding: 8px 16px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 900;
      transition: 0.3s;
      font-family: 'BNazanin', 'Vazirmatn', sans-serif;
      box-shadow: 0 6px 25px rgba(255, 200, 80, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      letter-spacing: 0.5px;
    }

    .lang-switch:hover {
      transform: scale(1.1);
      background: linear-gradient(145deg, #f5d078, #e8b84a);
      box-shadow: 0 8px 35px rgba(255, 200, 80, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .lang-switch:active {
      transform: scale(0.95);
    }

    /* ===== مدیریت نمایش متن‌ها ===== */
    .fa-text {
      display: inline;
    }
    .en-text {
      display: none;
    }

    body.lang-en .fa-text {
      display: none;
    }
    body.lang-en .en-text {
      display: inline;
    }

    #langBtnFa {
      display: inline;
    }
    #langBtnEn {
      display: none;
    }

    body.lang-en #langBtnFa {
      display: none;
    }
    body.lang-en #langBtnEn {
      display: inline;
    }

    .profile-pic {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 215, 120, 0.4);
      box-shadow: 0 8px 32px rgba(120, 80, 20, 0.15), 0 0 0 1px rgba(255, 215, 120, 0.2), 0 0 40px rgba(255, 200, 80, 0.08);
      background: #f5e6c8;
      margin-bottom: 0.8rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .profile-pic[src=""] { display: none; }

    .profile-pic-placeholder {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255, 215, 120, 0.1);
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255, 215, 120, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.8rem auto;
      font-size: 3.5rem;
      color: #b8860b;
      text-shadow: 0 0 25px rgba(255, 200, 80, 0.3);
      box-shadow: 0 8px 32px rgba(120, 80, 20, 0.1);
    }

    /* ===== فونت B NAZANIN ===== */
    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: #3d2b1a;
      text-shadow: 
        0 0 30px rgba(255, 200, 80, 0.2),
        0 4px 20px rgba(200, 150, 50, 0.1),
        0 8px 30px rgba(255, 200, 80, 0.05);
      margin-bottom: 0.2rem;
      filter: drop-shadow(0 6px 12px rgba(120, 80, 20, 0.05));
    }

    h1 .en-text {
      font-size: 2.2rem;
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: bold;
      color: #5a3d1a;
      background: rgba(255, 215, 120, 0.12);
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 120, 0.1);
      display: inline-block;
      margin-top: 0.1rem;
      text-shadow: 0 2px 20px rgba(255, 200, 80, 0.1);
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(120, 80, 20, 0.05);
    }

    .subtitle i {
      color: #b8860b;
      filter: drop-shadow(0 0 12px rgba(255, 200, 80, 0.15));
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #b8860b, transparent);
      margin: 1.5rem auto;
      border-radius: 10px;
      opacity: 0.4;
      filter: drop-shadow(0 0 12px rgba(255, 200, 80, 0.1));
    }

    .bio-text {
      font-size: 1.2rem;
      font-weight: bold;
      line-height: 2.2rem;
      color: #3d2b1a;
      background: rgba(255, 215, 120, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 120, 0.05);
      margin: 0.8rem 0 1.5rem 0;
      text-shadow: 0 2px 20px rgba(255, 200, 80, 0.05);
      letter-spacing: 0.5px;
      box-shadow: 0 4px 30px rgba(120, 80, 20, 0.03);
    }

    .bio-text i {
      color: #b8860b;
      margin: 0 6px;
      filter: drop-shadow(0 0 16px rgba(255, 200, 80, 0.1));
    }

    .email-box {
      background: rgba(255, 215, 120, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin: 1.5rem 0 1.2rem 0;
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      border: 1px solid rgba(255, 215, 120, 0.08);
      box-shadow: 0 8px 30px rgba(120, 80, 20, 0.05);
    }

    .email-box i {
      font-size: 1.6rem;
      color: #b8860b;
      filter: drop-shadow(0 0 20px rgba(255, 200, 80, 0.1));
    }

    .email-box a {
      color: #3d2b1a;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 2px solid rgba(255, 215, 120, 0.15);
      transition: 0.2s;
      word-break: break-all;
      text-shadow: 0 2px 20px rgba(255, 200, 80, 0.03);
      letter-spacing: 0.5px;
    }

    .email-box a:hover {
      color: #1a0f00;
      border-bottom: 2px solid #b8860b;
      text-shadow: 0 0 30px rgba(255, 200, 80, 0.15);
    }

    .callout {
      font-size: 1.3rem;
      font-weight: bold;
      background: rgba(255, 215, 120, 0.08);
      padding: 0.5rem 1.8rem;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 120, 0.06);
      margin-top: 1.2rem;
      display: inline-block;
      color: #3d2b1a;
      text-shadow: 
        0 0 30px rgba(255, 200, 80, 0.08),
        0 4px 20px rgba(120, 80, 20, 0.05);
      letter-spacing: 1.5px;
      box-shadow: 0 8px 32px rgba(120, 80, 20, 0.03);
    }

    .callout i {
      color: #b8860b;
      margin: 0 8px;
      filter: drop-shadow(0 0 20px rgba(255, 200, 80, 0.1));
    }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: bold;
      opacity: 0.4;
      color: #5a3d1a;
      border-top: 1px solid rgba(255, 215, 120, 0.05);
      padding-top: 1.2rem;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(255, 200, 80, 0.02);
    }

    /* ===== ریسپانسیو برای گوشی ===== */
    @media (max-width: 480px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
        border-radius: 30px 10px 30px 10px;
      }

      h1 {
        font-size: 1.8rem;
      }
      h1 .en-text {
        font-size: 1.6rem;
      }

      .subtitle {
        font-size: 0.9rem;
        padding: 0.3rem 1rem;
      }

      .bio-text {
        font-size: 1rem;
        line-height: 1.8rem;
        padding: 0.5rem 0.8rem;
      }

      .email-box {
        padding: 0.6rem 1rem;
      }
      .email-box a {
        font-size: 1rem;
      }
      .email-box i {
        font-size: 1.3rem;
      }

      .callout {
        font-size: 1.1rem;
        padding: 0.4rem 1.2rem;
      }

      .profile-pic {
        width: 90px;
        height: 90px;
      }
      .profile-pic-placeholder {
        width: 90px;
        height: 90px;
        font-size: 2.8rem;
      }

      .lang-switch {
        top: 10px;
        left: 12px;
        font-size: 0.7rem;
        padding: 5px 10px;
      }

      .divider {
        width: 60px;
        margin: 1rem auto;
      }
    }

    @media (max-width: 380px) {
      .glass-card {
        padding: 1.2rem 0.8rem;
        border-radius: 20px 8px 20px 8px;
      }
      h1 {
        font-size: 1.5rem;
      }
      h1 .en-text {
        font-size: 1.3rem;
      }
      .bio-text {
        font-size: 0.85rem;
        line-height: 1.6rem;
      }
      .callout {
        font-size: 0.95rem;
        padding: 0.3rem 1rem;
      }
      .email-box a {
        font-size: 0.85rem;
      }
      .lang-switch {
        font-size: 0.6rem;
        padding: 4px 8px;
        top: 8px;
        left: 8px;
      }
      .profile-pic {
        width: 75px;
        height: 75px;
      }
      .profile-pic-placeholder {
        width: 75px;
        height: 75px;
        font-size: 2.2rem;
      }
      .subtitle {
        font-size: 0.75rem;
        padding: 0.2rem 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card" id="app">

    <button class="lang-switch" onclick="toggleLang()">
      <span id="langBtnFa">🇮🇷 فارسی</span>
      <span id="langBtnEn">🇬🇧 English</span>
    </button>

    <img src="ashkan-profile.jpg" alt="عکس اشکان" class="profile-pic" id="profileImg" 
         onerror="this.style.display='none'; document.getElementById('placeholder').style.display='flex';">
    <div class="profile-pic-placeholder" id="placeholder" style="display: none;">
      <i class="fas fa-gamepad"></i>
    </div>

    <h1>
      <span class="fa-text">اشکان پیمان</span>
      <span class="en-text">Ashkan Peyman</span>
    </h1>

    <span class="subtitle">
      <i class="fas fa-crown" style="margin-left: 8px;"></i> 
      <span class="fa-text">سازنده سایت AP Game</span>
      <span class="en-text">Founder of AP Game</span>
    </span>

    <div class="divider"></div>

    <div class="bio-text">
      <i class="fas fa-dice-d6"></i> 
      <span class="fa-text">یک عاشق گیم</span>
      <span class="en-text">A game lover</span>
      <i class="fas fa-dice-d6"></i>
    </div>

    <div class="email-box">
      <i class="fas fa-envelope-open-text"></i>
      <a href="mailto:support.apgame@gmail.com">
        support.apgame@gmail.com
      </a>
    </div>

    <div class="callout">
      <i class="fas fa-hourglass-half"></i> 
      <span class="fa-text">اگه کاری داشتید منتظرم</span>
      <span class="en-text">I'm waiting for you</span>
      <i class="fas fa-heart" style="color:#b8860b; margin-right:6px;"></i>
    </div>

    <div class="footer-note">
      <i class="fas fa-chevron-circle-left" style="opacity:0.5;"></i> 
      AP Game · 
      <span class="fa-text">همیشه برای بازی</span>
      <span class="en-text">Always for gaming</span>
      <i class="fas fa-chevron-circle-right" style="opacity:0.5;"></i>
    </div>

  </div>

  <script>
    let lang = 'fa';

    function toggleLang() {
      if (lang === 'fa') {
        lang = 'en';
        document.body.classList.add('lang-en');
        document.getElementById('langBtnFa').style.display = 'none';
        document.getElementById('langBtnEn').style.display = 'inline';
      } else {
        lang = 'fa';
        document.body.classList.remove('lang-en');
        document.getElementById('langBtnFa').style.display = 'inline';
        document.getElementById('langBtnEn').style.display = 'none';
      }
    }

    document.getElementById('langBtnEn').style.display = 'none';
  </script>
</body>
</html>
